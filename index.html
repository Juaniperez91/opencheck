function renderRangosSA(){
  var c=document.getElementById('rangos-cont');
  if(!c)return;
  c.innerHTML=scoringVars.filter(function(v){return v.activa;}).map(function(v){
    var esDesc=v.rangos[0]&&v.rangos[0].desc!==undefined;
    var filas=v.rangos.map(function(r,ri){
      var celda=esDesc?
        '<td colspan="2" style="padding:7px 14px"><input type="text" value="'+(r.desc||'')+'" style="width:100%;font-size:12px;border:1px solid var(--s3);border-radius:6px;padding:4px 8px" onchange="updRangoSA('+v.id+','+ri+',\'desc\',this.value)"></td>':
        '<td style="padding:7px 14px"><input type="number" value="'+(r.d||0)+'" style="width:90px;font-size:12px;font-family:var(--mono);border:1px solid var(--s3);border-radius:6px;padding:4px 8px;text-align:right" onchange="updRangoSA('+v.id+','+ri+',\'d\',parseFloat(this.value))"><span style="font-size:11px;color:var(--t3)"> min</span></td>'+
        '<td style="padding:7px 14px"><input type="text" value="'+(r.h===null?'inf':r.h)+'" style="width:90px;font-size:12px;font-family:var(--mono);border:1px solid var(--s3);border-radius:6px;padding:4px 8px;text-align:right" onchange="updRangoSA('+v.id+','+ri+',\'h\',this.value===\'inf\'?null:parseFloat(this.value))"><span style="font-size:11px;color:var(--t3)"> max</span></td>';
      var pInput='<td style="padding:7px 14px"><input type="text" value="'+r.p+'" style="width:65px;font-size:12px;font-family:var(--mono);border:1px solid var(--s3);border-radius:6px;padding:4px 8px;text-align:center;'+(r.p==='C2'?'color:var(--rm);font-weight:700;background:var(--rl)':'')+'" onchange="updRangoSA('+v.id+','+ri+',\'p\',this.value===\'C2\'?\'C2\':parseFloat(this.value))"><span style="font-size:11px;color:var(--t3)"> pts</span></td>'+
        '<td style="padding:7px 14px"><button onclick="quitarRangoSA('+v.id+','+ri+')" style="background:none;border:none;cursor:pointer;color:var(--t3);font-size:18px;padding:0 4px">x</button></td>';
      return '<tr style="border-bottom:1px solid var(--s3)">'+celda+pInput+'</tr>';
    }).join('');
    return '<div class="card" id="rango-block-'+v.id+'" style="margin-bottom:14px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
      '<span style="font-size:13px;font-weight:600;color:var(--t2)">'+v.nm+'</span>'+
      '<div class="flex gap-8 items-center">'+

      (esDesc?'':'<span style="font-size:11px;color:var(--t3)">Desde / Hasta / Puntos</span>')+
      '<button class="btn btn-sm" onclick="addRangoSA('+v.id+')">+ Fila</button></div></div>'+
      '<div class="table-wrap"><table style="border-collapse:collapse;width:100%;font-size:12px"><tbody>'+filas+'</tbody></table></div></div>';
  }).join('');
}

function renderUsersRows(users){
  if(!users.length)return '<tr><td colspan="10" class="text-center" style="padding:24px;color:var(--t3)">Sin usuarios</td></tr>';
  return users.map(function(u){
    var statusBadge=u.status==='active'?'badge-A1':'badge-C2';
    var roles=(u.roles||[u.role]).map(function(r){return '<span class="badge badge-B1" style="margin-right:3px">'+r+'</span>';}).join('');
    var actions='';
    if(u.email!=='admin@opencheck.com'){
      if(u.status==='active'){
        actions='<button class="btn btn-danger btn-sm" onclick="toggleUserStatus(\''+u.id+'\',\'suspended\')">Suspender</button>';
      } else {
        actions='<button class="btn btn-primary btn-sm" onclick="toggleUserStatus(\''+u.id+'\',\'active\')">Activar</button>';
      }
    }
    return '<tr>'+
      '<td class="bold">'+u.name+'</td>'+
      '<td class="mono" style="font-size:11px">'+formatCuit(u.cuit||'')+'</td>'+
      '<td style="font-size:12px">'+(u.tipopersona||'—')+'</td>'+
      '<td style="font-size:12px;color:var(--t2)">'+u.email+'</td>'+
      '<td style="font-size:12px">'+new Date(u.createdAt||Date.now()).toLocaleDateString('es-AR')+'</td>'+
      '<td>'+(u.idVerified?'<span style="color:var(--g);font-size:12px">✅ Validado</span>':'<span style="color:var(--rm);font-size:12px">❌ Pendiente</span>')+'</td>'+
      '<td>'+(u.tyc?'<span style="color:var(--g);font-size:12px">✅ v1.0</span>':'<span style="color:var(--t3);font-size:12px">—</span>')+'</td>'+
      '<td>'+roles+'</td>'+
      '<td><span class="badge '+statusBadge+'">'+u.status+'</span></td>'+
      '<td>'+actions+'</td></tr>';
  }).join('');
}

function filterUsuarios(){
  var search=(document.getElementById('usr-search').value||'').toLowerCase();
  var estado=document.getElementById('usr-estado').value;
  var tipo=document.getElementById('usr-tipo').value;
  var users=getUsers().filter(function(u){
    var matchSearch=!search||(u.name||'').toLowerCase().indexOf(search)>=0||(u.email||'').toLowerCase().indexOf(search)>=0||(u.cuit||'').indexOf(search)>=0;
    var matchEstado=estado==='todos'||u.status===estado;
    var matchTipo=tipo==='todos'||u.tipopersona===tipo;
    return matchSearch&&matchEstado&&matchTipo;
  });
  var tb=document.getElementById('users-tbody');
  if(tb)tb.innerHTML=renderUsersRows(users);
}

function toggleUserStatus(userId,newStatus){
  var users=getUsers();
  var idx=users.findIndex(function(u){return u.id===userId;});
  if(idx<0)return;
  users[idx].status=newStatus;
  setUsers(users);
  addLog('Usuario '+(newStatus==='active'?'activado':'suspendido')+': '+users[idx].email,'system');
  showToast('Usuario '+newStatus,'success');
  navigateTo('admin-usuarios');
}

function openScoringDetail(checkId){
  var check=getChecks().find(function(c){return c.id===checkId;});
  if(!check||!check.scoring)return;
  var s=check.scoring;
  var cat=s.cat;
  var html='<div class="modal-header"><h3>Scoring — '+check.razonLibrador+'</h3><button class="modal-close" onclick="closeModal()">✕</button></div>';
  html+='<div class="modal-body">';
  html+='<div class="scoring-card '+cat+'" style="margin-bottom:16px"><div class="flex gap-12 items-center" style="margin-bottom:12px"><span style="font-size:36px">'+CAT_EMOJI[cat]+'</span><div><div class="bold text-xl">'+cat+'</div><div class="text-lg mono">'+s.pts+' puntos</div></div></div>';
  html+='<div class="grid-2"><div><div class="text-sm" style="color:var(--t2);margin-bottom:6px">Factores favorables</div>'+s.factores.map(function(f){return '<div style="font-size:12px;margin-top:4px">✅ '+f+'</div>';}).join('')+'</div>';
  html+='<div><div class="text-sm" style="color:var(--t2);margin-bottom:6px">Puntos de atención</div>'+s.atencion.map(function(a){return '<div style="font-size:12px;margin-top:4px">⚠️ '+a+'</div>';}).join('')+'</div></div>';
  html+='<div class="divider"></div><div style="font-size:13px;font-style:italic">'+s.rec+'</div></div>';
  // Desglose si existe
  if(s.desglose){
    html+='<div style="margin-bottom:12px"><div class="bold text-sm" style="margin-bottom:8px;color:var(--t2)">DESGLOSE POR VARIABLE</div>';
    html+='<div class="table-wrap"><table><thead><tr><th>Variable</th><th>Pts variable</th><th>Peso</th><th>Aporte</th></tr></thead><tbody>';
    var dg=s.desglose;
    var varNames={score_nosis:'Score Nosis',endeudamiento:'Endeudamiento librador',antiguedad:'Antigüedad CUIT',perfil_legal:'Perfil legal',bancos:'Bancos activos',consultas:'Consultas 12m',endeud_v:'Endeud. vendedor (BCRA)',rechazos_v:'Rechazos vendedor (BCRA)'};
    Object.keys(dg).forEach(function(k){
      var v=dg[k];
      var fuenteBadge='';
      if((k==='endeud_v'||k==='rechazos_v')&&v.fuente){
        fuenteBadge=v.fuente==='bcra_real'
          ?' <span style="font-size:10px;background:var(--gl);color:var(--gd);padding:1px 5px;border-radius:3px">BCRA</span>'
          :' <span style="font-size:10px;background:var(--al);color:var(--am);padding:1px 5px;border-radius:3px">neutro</span>';
      }
      html+='<tr><td>'+(varNames[k]||k)+fuenteBadge+'</td><td class="mono">'+v.pts+'</td><td class="mono">'+v.peso+'%</td><td class="mono bold" style="color:var(--g)">'+v.aporte+'</td></tr>';
    });
    html+='</tbody></table></div></div>';
  }
  if(s.penAplicadas&&s.penAplicadas.length){
    html+='<div class="alert alert-warning" style="font-size:12px"><span>⚠️</span><div><div class="bold" style="margin-bottom:4px">Penalizaciones aplicadas</div>'+s.penAplicadas.map(function(p){return '<div>'+p+'</div>';}).join('')+'</div></div>';
  }
  html+='</div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cerrar</button></div>';
  showModal(html);
}

function showModal(html){
  document.getElementById('modal-box').innerHTML=html;
  var overlay=document.getElementById('modal-overlay');
  overlay.style.display='flex';
  setTimeout(function(){overlay.classList.add('show');},10);
}
function closeModal(){
  var overlay=document.getElementById('modal-overlay');
  overlay.classList.remove('show');
  setTimeout(function(){overlay.style.display='none';},200);
}
function closeModalOverlay(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

// ============================================================
// TOAST
// ============================================================
function showToast(msg,type){
  var c=document.getElementById('toast-container');
  var t=document.createElement('div');
  t.className='toast '+(type||'');
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(function(){t.classList.add('show');},10);
  setTimeout(function(){t.classList.remove('show');setTimeout(function(){c.removeChild(t);},300);},3000);
}

function togglePass(inputId,btn){
  var inp=document.getElementById(inputId);
  if(!inp)return;
  var show=inp.type==='password';
  inp.type=show?'text':'password';
  btn.textContent=show?'🙈':'👁';
  btn.title=show?'Ocultar contraseña':'Mostrar contraseña';
}

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function formatMoney(n){
  if(!n&&n!==0)return '—';
  return '$'+Number(n).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function formatCuit(c){if(!c)return '—';var s=String(c);if(s.length===11)return s.slice(0,2)+'-'+s.slice(2,10)+'-'+s.slice(10);return s;}
function getBankName(code){return BANKS[code]||'Banco '+code;}
function getDays(fechaPago){
  var today=new Date();today.setHours(0,0,0,0);
  var pago=new Date(fechaPago);
  return Math.max(0,Math.round((pago-today)/86400000));
}

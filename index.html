<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCheck — Marketplace de eCheques</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--g:#0F6E56;--gl:#E1F5EE;--gm:#1D9E75;--gb:#9FE1CB;--gd:#085041;
--am:#854F0B;--al:#FAEEDA;
--bl:#E6F1FB;--bd:#0C447C;
--rl:#FCEBEB;--rm:#A32D2D;
--s:#fff;--s2:#F8F7F4;--s3:#EDECEA;
--t:#1A1917;--t2:#6B6963;--t3:#9A9891;
--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
--r:8px;--rl2:12px;--rxl:16px;
--sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
--sh2:0 2px 8px rgba(0,0,0,.12),0 8px 32px rgba(0,0,0,.1);
}
html,body{height:100%;font-family:var(--font);color:var(--t);background:var(--s2);font-size:14px;line-height:1.5}
/* UTILITIES */
.hidden{display:none!important}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-4{gap:4px}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}.gap-24{gap:24px}
.w-full{width:100%}.text-center{text-align:center}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.p-8{padding:8px}.p-12{padding:12px}.p-16{padding:16px}.p-24{padding:24px}
.bold{font-weight:600}.text-sm{font-size:12px}.text-lg{font-size:16px}.text-xl{font-size:20px}.text-2xl{font-size:24px}
.text-muted{color:var(--t2)}.text-green{color:var(--g)}.text-red{color:var(--rm)}
.mono{font-family:var(--mono)}
.rounded{border-radius:var(--r)}.rounded-lg{border-radius:var(--rl2)}.rounded-xl{border-radius:var(--rxl)}
/* SCREENS */
#screen-login,#screen-register,#screen-app{position:fixed;inset:0;overflow:hidden;display:flex;flex-direction:column}
/* LOGIN */
#screen-login{background:linear-gradient(135deg,var(--gd) 0%,var(--g) 50%,var(--gm) 100%);display:flex;align-items:center;justify-content:center}
.login-card{background:var(--s);border-radius:20px;padding:48px;width:420px;box-shadow:var(--sh2)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.login-logo-icon{width:40px;height:40px;background:var(--g);border-radius:10px;display:flex;align-items:center;justify-content:center}
.login-logo-icon svg{fill:white;width:22px;height:22px}
.login-logo-text{font-size:22px;font-weight:700;color:var(--t);letter-spacing:-0.5px}
.login-logo-text span{color:var(--g)}
.login-title{font-size:24px;font-weight:700;margin-bottom:6px;letter-spacing:-0.5px}
.login-sub{color:var(--t2);margin-bottom:28px;font-size:14px}
/* REGISTER */
#screen-register{background:var(--s2);display:flex;align-items:center;justify-content:center;padding:24px}
.register-card{background:var(--s);border-radius:20px;width:540px;max-width:100%;box-shadow:var(--sh2);overflow:hidden}
.register-header{background:linear-gradient(135deg,var(--g),var(--gm));padding:28px 36px;color:white}
.register-header h2{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.register-steps{display:flex;gap:8px;margin-top:16px}
.register-step{flex:1;height:4px;background:rgba(255,255,255,0.3);border-radius:2px;transition:background 0.3s}
.register-step.done{background:white}
.register-body{padding:36px}
/* FORM ELEMENTS */
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--s3);border-radius:var(--r);padding:10px 12px;font-family:var(--font);font-size:14px;color:var(--t);background:var(--s);transition:border-color .2s,box-shadow .2s;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(15,110,86,.1)}
.field input.error,.field select.error{border-color:var(--rm)}
.field-hint{font-size:12px;color:var(--t3);margin-top:4px}
.field-error{font-size:12px;color:var(--rm);margin-top:4px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--r);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--g);color:white}.btn-primary:hover{background:var(--gd)}
.btn-secondary{background:var(--s3);color:var(--t)}.btn-secondary:hover{background:var(--s3);filter:brightness(.95)}
.btn-outline{background:transparent;color:var(--g);border:1.5px solid var(--gb)}.btn-outline:hover{background:var(--gl)}
.btn-danger{background:var(--rm);color:white}.btn-danger:hover{filter:brightness(.9)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-lg{padding:12px 24px;font-size:15px;font-weight:600}
.btn-xl{padding:14px 28px;font-size:16px;font-weight:600;border-radius:var(--rl2)}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* APP LAYOUT */
#screen-app{display:flex;flex-direction:column}
.topbar{background:var(--s);border-bottom:1px solid var(--s3);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--t)}
.topbar-logo-icon{width:32px;height:32px;background:var(--g);border-radius:8px;display:flex;align-items:center;justify-content:center}
.topbar-logo-icon svg{fill:white;width:18px;height:18px}
.topbar-logo-text{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.topbar-logo-text span{color:var(--g)}
.role-selector{display:flex;background:var(--s2);border-radius:var(--r);padding:3px}
.role-btn{padding:5px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--t2);transition:all .2s}
.role-btn.active{background:var(--s);color:var(--g);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.topbar-right{display:flex;align-items:center;gap:12px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--g);cursor:pointer}
/* SIDEBAR + MAIN */
.app-body{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;background:var(--s);border-right:1px solid var(--s3);padding:16px 12px;overflow-y:auto;flex-shrink:0}
.sidebar-section{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);padding:12px 8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);cursor:pointer;color:var(--t2);font-size:14px;font-weight:450;transition:all .15s;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left}
.nav-item:hover{background:var(--s2);color:var(--t)}
.nav-item.active{background:var(--gl);color:var(--g);font-weight:600}
.nav-item .nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* MAIN CONTENT */
.main-content{flex:1;overflow-y:auto;padding:28px}
.page-header{margin-bottom:24px}
.page-header h1{font-size:22px;font-weight:700;letter-spacing:-0.4px;margin-bottom:4px}
.page-header p{color:var(--t2);font-size:14px}
/* CARDS */
.card{background:var(--s);border-radius:var(--rl2);border:1px solid var(--s3);padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600}
/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--s);border-radius:var(--rl2);border:1px solid var(--s3);padding:20px}
.stat-label{font-size:12px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;letter-spacing:-0.5px;color:var(--t)}
.stat-sub{font-size:12px;color:var(--t3);margin-top:4px}
.stat-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;padding:3px 8px;border-radius:20px}
.stat-badge.up{background:var(--gl);color:var(--g)}
.stat-badge.neutral{background:var(--s3);color:var(--t2)}
/* BADGES / CATEGORIES */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px;font-family:var(--mono)}
.badge-A1{background:var(--gl);color:var(--gd)}
.badge-A2{background:var(--gl);color:var(--g)}
.badge-B1{background:var(--bl);color:var(--bd)}
.badge-B2{background:#EEF2FF;color:#3730A3}
.badge-C1{background:var(--al);color:var(--am)}
.badge-C2{background:var(--rl);color:var(--rm)}
/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:12px;font-weight:600;color:var(--t2);text-align:left;padding:10px 12px;border-bottom:1.5px solid var(--s3);white-space:nowrap}
td{padding:12px;border-bottom:1px solid var(--s3);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--s2)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;opacity:0;transition:opacity .2s}
.modal-overlay.show{opacity:1}
.modal{background:var(--s);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .2s}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-header{padding:24px 24px 0;display:flex;justify-content:space-between;align-items:flex-start}
.modal-header h3{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--s3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t2);flex-shrink:0}
.modal-body{padding:24px}
.modal-footer{padding:0 24px 24px;display:flex;gap:10px;justify-content:flex-end}
/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--s3);background:var(--s);color:var(--t2);transition:all .15s}
.filter-chip.active{border-color:var(--g);background:var(--gl);color:var(--g)}
/* PROGRESS BAR */
.progress-bar{height:8px;background:var(--s3);border-radius:4px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:var(--g);border-radius:4px;transition:width .5s}
/* ALERTS */
.alert{padding:12px 16px;border-radius:var(--r);font-size:13px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start}
.alert-success{background:var(--gl);color:var(--gd);border:1px solid var(--gb)}
.alert-warning{background:var(--al);color:var(--am);border:1px solid #F5C68A}
.alert-error{background:var(--rl);color:var(--rm);border:1px solid #F5BABA}
.alert-info{background:var(--bl);color:var(--bd);border:1px solid #B8D8F5}
/* SCORING CARD */
.scoring-card{border:1.5px solid var(--s3);border-radius:var(--rl2);padding:20px;margin-bottom:16px}
.scoring-card.A1{border-color:var(--gb);background:var(--gl)}
.scoring-card.A2{border-color:var(--gb);background:var(--gl)}
.scoring-card.B1{border-color:#B8D8F5;background:var(--bl)}
.scoring-card.B2{border-color:#C7D2FE;background:#EEF2FF}
.scoring-card.C1{border-color:#F5C68A;background:var(--al)}
.scoring-card.C2{border-color:#F5BABA;background:var(--rl)}
/* MARKETPLACE GRID */
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.market-card{background:var(--s);border:1.5px solid var(--s3);border-radius:var(--rl2);padding:20px;cursor:pointer;transition:all .2s}
.market-card:hover{border-color:var(--gb);box-shadow:var(--sh);transform:translateY(-2px)}
.market-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.market-amount{font-size:22px;font-weight:700;color:var(--t);letter-spacing:-0.5px}
.market-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.market-meta-item{font-size:12px;color:var(--t2)}
.market-meta-item span{display:block;font-size:13px;font-weight:600;color:var(--t);margin-top:2px}
/* CALCULATOR */
.calc-result{background:var(--s2);border-radius:var(--rl2);padding:20px;margin-top:16px}
.calc-result-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--s3)}
.calc-result-row:last-child{border-bottom:none;font-weight:700;font-size:15px}
.calc-result-row.highlight{color:var(--g);font-weight:600}
/* ADMIN TABS */
.tab-bar{display:flex;gap:2px;background:var(--s3);border-radius:var(--r);padding:3px;margin-bottom:24px}
.tab-item{flex:1;padding:8px;border-radius:6px;border:none;background:transparent;font-family:var(--font);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .2s;text-align:center}
.tab-item.active{background:var(--s);color:var(--g);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}
/* NOTIFICATION DOT */
.notif-dot{width:8px;height:8px;background:var(--rm);border-radius:50%;display:inline-block}
/* STEP WIZARD */
.step-indicator{display:flex;align-items:center;gap:8px;margin-bottom:28px}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--s3);color:var(--t3);transition:all .3s}
.step-dot.done{background:var(--g);border-color:var(--g);color:white}
.step-dot.active{border-color:var(--g);color:var(--g)}
.step-line{flex:1;height:2px;background:var(--s3);transition:background .3s}
.step-line.done{background:var(--g)}
/* CHECKBOX */
.checkbox-field{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--s3)}
.checkbox-field:last-child{border-bottom:none}
.checkbox-field input[type=checkbox]{width:16px;height:16px;margin-top:2px;accent-color:var(--g);cursor:pointer;flex-shrink:0}
.checkbox-field label{font-size:13px;color:var(--t);cursor:pointer;line-height:1.5}
/* BANK CHIP */
.bank-chip{display:inline-flex;align-items:center;gap:6px;background:var(--s3);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:500}
/* RANGE INPUT */
.range-input{width:100%;accent-color:var(--g);cursor:pointer}
/* DIVIDER */
.divider{height:1px;background:var(--s3);margin:16px 0}
/* GRID 2 COL */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
/* TOAST */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--t);color:white;padding:12px 18px;border-radius:var(--rl2);font-size:13px;font-weight:500;box-shadow:var(--sh2);opacity:0;transform:translateX(20px);transition:all .3s;max-width:320px}
.toast.show{opacity:1;transform:translateX(0)}
.toast.success{background:var(--gd)}
.toast.error{background:var(--rm)}
.toast.warning{background:var(--am)}
/* SPINNER */
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.spinner-green{border-color:var(--gb);border-top-color:var(--g)}
@keyframes spin{to{transform:rotate(360deg)}}
/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-state-icon{font-size:48px;margin-bottom:12px}
.empty-state h3{font-size:16px;font-weight:600;color:var(--t2);margin-bottom:6px}
.empty-state p{font-size:13px}
.spr-in{width:60px;padding:5px 8px;font-size:12px;border:1px solid var(--s3);border-radius:6px;background:var(--s);color:var(--t);text-align:center;font-family:var(--mono)}.spr-in:focus{outline:none;border-color:var(--g)}
/* EYE TOGGLE */
.pass-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t3);font-size:16px;padding:2px 4px;line-height:1;transition:color .15s}
.pass-eye:hover{color:var(--t)}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}
/* INPUTS INLINE */
.input-inline{border:1.5px solid var(--s3);border-radius:var(--r);padding:8px 12px;font-family:var(--font);font-size:14px;color:var(--t);background:var(--s);outline:none;transition:border-color .2s}
.input-inline:focus{border-color:var(--g)}
/* OFFER ROW */
.offer-row{background:var(--s);border:1px solid var(--s3);border-radius:var(--rl2);padding:16px 20px;margin-bottom:12px}
.offer-row:last-child{margin-bottom:0}
/* RATE RANGE */
.rate-range-bar{position:relative;height:8px;background:var(--s3);border-radius:4px;margin:12px 0}
.rate-range-fill{position:absolute;height:100%;background:var(--gb);border-radius:4px}
.rate-range-marker{position:absolute;width:14px;height:14px;background:var(--g);border:2px solid white;border-radius:50%;top:50%;transform:translate(-50%,-50%);box-shadow:0 1px 3px rgba(0,0,0,.2)}
/* ACTIVITY LOG */
.log-entry{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--s3)}
.log-entry:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.log-text{font-size:13px;color:var(--t)}
.log-time{font-size:11px;color:var(--t3)}
</style>
</head>
<body>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- SCREEN: LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="login-logo-text">Open<span>Check</span></div>
    </div>
    <div class="login-title">Bienvenido</div>
    <div class="login-sub">Marketplace de eCheques argentinos</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="tu@email.com" oninput="clearLoginError()">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <div style="position:relative">
        <input type="password" id="login-pass" placeholder="••••••••" oninput="clearLoginError()" onkeydown="if(event.key==='Enter')doLogin()" style="width:100%;border:1.5px solid var(--s3);border-radius:var(--r);padding:10px 40px 10px 12px;font-family:var(--font);font-size:14px;color:var(--t);background:var(--s);outline:none;transition:border-color .2s">
        <button type="button" onclick="togglePass('login-pass',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t3);font-size:16px;padding:2px 4px;line-height:1" title="Mostrar/ocultar contraseña">👁</button>
      </div>
    </div>
    <div id="login-error" class="alert alert-error hidden"></div>
    <button class="btn btn-primary btn-xl w-full mt-4" onclick="doLogin()">Ingresar</button>
    <div class="text-center mt-16" style="color:var(--t2);font-size:13px">
      ¿No tenés cuenta? <a href="#" style="color:var(--g);font-weight:600" onclick="showRegister()">Registrate</a>
    </div>
    <div class="mt-16" style="padding-top:14px;border-top:1px solid var(--s3)">
      <div style="font-size:11px;color:var(--t3);text-align:center;margin-bottom:8px">Accesos demo rapidos</div>

function doLogin(){
  var email=document.getElementById('login-email').value.trim().toLowerCase();
  var pass=document.getElementById('login-pass').value;
  clearLoginError();
  if(!email||!pass){showLoginError('Completá email y contraseña.');return;}

  // Admin: strict validation
  if(email==='admin@opencheck.com'){
    if(pass==='Admin2025'){
      var users=getUsers();
      var admin=users.find(function(u){return u.email==='admin@opencheck.com';});
      if(!admin){showLoginError('Error interno: usuario admin no encontrado.');return;}
      state.currentUser=admin;
      state.currentRole='admin';
      addLog('Login admin','auth');
      enterApp();
      return;
    }else{
      showLoginError('Contraseña incorrecta para admin.');return;
    }
  }

  // Demo users: accept any password >= 6 chars (like reference)
  var demoEmails=['vendedor@test.com','inversor@test.com'];
  var isDemoUser=demoEmails.indexOf(email)>=0;
  if(isDemoUser&&pass.length<6){
    showLoginError('La contraseña debe tener al menos 6 caracteres.');return;
  }

  // Look up user — force re-seed first to ensure demo users are fresh
  forceSeedDemoUsers();
  var users=getUsers();
  // Normalize email comparison
  var user=users.find(function(u){return (u.email||'').toLowerCase()===email;});
  if(!user){showLoginError('Email no registrado.');return;}
  if(user.status==='suspended'){showLoginError('Cuenta suspendida. Contactá a soporte.');return;}
  // For demo users accept any valid pass; for real users check exact pass
  if(!isDemoUser&&user.pass&&user.pass!==pass){
    showLoginError('Contraseña incorrecta.');return;
  }
  state.currentUser=user;
  // Normalize: any non-admin always gets both roles
  if(user.roles&&user.roles.indexOf('admin')<0){
    user.roles=['vendedor','inversor'];
    user.role='vendedor';
    // Persist the normalized roles
    var allUsers=getUsers();
    var ui=allUsers.findIndex(function(u){return u.id===user.id;});
    if(ui>=0){allUsers[ui].roles=['vendedor','inversor'];allUsers[ui].role='vendedor';setUsers(allUsers);}
  }
  state.currentRole=user.roles&&user.roles[0]||'vendedor';
  addLog('Login: '+user.email,'auth');
  enterApp();
}

var _regToken = null;

async function sendVerificationToken(){
  var email = document.getElementById('r-email') ? document.getElementById('r-email').value.trim() : regData.email;
  var nombre = document.getElementById('r-nombre') ? document.getElementById('r-nombre').value.trim() : regData.nombre;
  if(!email) return false;
  _regToken = Math.floor(100000 + Math.random() * 900000).toString();
  try {
    var r = await fetch('/.netlify/functions/send-token', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: 'juanignacioperez1991@gmail.com', token: _regToken, nombre: nombre})
    });
    return r.ok;
  } catch(e) {
    console.log('Error enviando token:', e.message);
    return false;
  }
}

function renderRegStepToken(){
  return '<div class="text-center" style="padding:16px 0">'+
    '<div style="font-size:48px;margin-bottom:12px">📧</div>'+
    '<div class="text-lg bold" style="margin-bottom:8px">Verificá tu email</div>'+
    '<div style="color:var(--t2);font-size:13px;margin-bottom:6px">Enviamos un código de 6 dígitos a</div>'+
    '<div class="bold" style="margin-bottom:20px;color:var(--g)">'+regData.email+'</div>'+
    '<div class="field" style="max-width:200px;margin:0 auto 16px">'+
    '<label>Código de verificación</label>'+
    '<input type="text" id="r-token" maxlength="6" placeholder="123456" style="font-size:24px;font-weight:700;text-align:center;letter-spacing:8px;font-family:var(--mono)">'+
    '</div>'+
    '<div id="token-err" class="alert alert-error hidden"></div>'+
    '<div style="margin-top:8px"><button class="btn btn-secondary btn-sm" onclick="resendToken()">Reenviar código</button></div>'+
    '</div>';
}

async function resendToken(){
  showToast('Reenviando código...','');
  var ok = await sendVerificationToken();
  if(ok) showToast('Código reenviado a '+regData.email,'success');
  else showToast('Error al reenviar. Revisá tu email.','error');
}

function doVerify(){
  var btn=document.getElementById('btn-verify');
  if(!btn)return;
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>&nbsp;Verificando...';
  setTimeout(function(){
    idVerified=true;
    document.getElementById('reg-content').innerHTML=renderRegStep1();
  },2000);
}

async function regNext(){
  if(regStep===0){
    regData.tipopersona=document.getElementById('r-tipopersona').value;
    regData.cuit=document.getElementById('r-cuit').value.trim();
    regData.nombre=document.getElementById('r-nombre').value.trim();
    regData.tel=document.getElementById('r-tel').value.trim();
    regData.email=document.getElementById('r-email').value.trim();
    regData.pass=document.getElementById('r-pass').value;
    var err='';
    if(!regData.nombre)err='Ingresá tu nombre o razón social.';
    else if(!regData.cuit)err='Ingresá tu CUIT o DNI.';
    else if(!regData.email||!regData.email.includes('@'))err='Email inválido.';
    else if(!regData.pass||regData.pass.length<8)err='La contraseña debe tener al menos 8 caracteres.';
    else if(!/[A-Z]/.test(regData.pass))err='La contraseña debe tener al menos una mayúscula.';
    else if(!/[0-9]/.test(regData.pass))err='La contraseña debe tener al menos un número.';
    else{
      var users=getUsers();
      if(users.find(function(u){return u.email===regData.email;}))err='Ese email ya está registrado.';
    }
    if(err){
      var errEl=document.getElementById('reg-err-0');
      errEl.textContent=err;errEl.classList.remove('hidden');return;
    }
    // Enviar token al email antes de avanzar
    var btnNext = document.getElementById('reg-next-btn');
    btnNext.disabled=true;
    btnNext.textContent='Enviando código...';
    var sent = await sendVerificationToken();
    btnNext.disabled=false;
    btnNext.textContent='Continuar';
    if(sent){
      regStep=1;
      document.getElementById('reg-content').innerHTML=renderRegStepToken();
      document.getElementById('reg-step-label').textContent='Verificación de email';
      document.getElementById('reg-next-btn').textContent='Verificar';
      return;
    } else {
      regStep=1;renderRegStep();
    }
  }else if(regStep===1){
    // Si estamos en el paso de verificacion de token
    var tokenInput = document.getElementById('r-token');
    if(tokenInput){
      var ingresado = tokenInput.value.trim();
      if(!ingresado){showToast('Ingresá el código de verificación','error');return;}
      if(ingresado !== _regToken){
        var errEl=document.getElementById('token-err');
        errEl.textContent='Código incorrecto. Revisá tu email.';
        errEl.classList.remove('hidden');
        return;
      }
      // Token correcto — avanzar a validacion de identidad
      showToast('Email verificado correctamente','success');
      document.getElementById('reg-next-btn').textContent='Continuar';
      regStep=1;renderRegStep();
      return;
    }
    if(!idVerified){showToast('Debés validar tu identidad antes de continuar','error');return;}
    regStep=2;renderRegStep();
  }else if(regStep===2){
    for(var i=0;i<4;i++){
      var cb=document.getElementById('tyc-'+i);
      if(cb)regChecks[i]=cb.checked;
    }
    if(!regChecks[0]||!regChecks[1]||!regChecks[2]||!regChecks[3]){showToast('Debés aceptar todos los términos','error');return;}
    regStep=3;renderRegStep();
  }else{
    // CREATE ACCOUNT — always both roles
    var users=getUsers();
    var newUser={
      id:'u'+Date.now(),
      email:regData.email,
      pass:regData.pass,
      name:regData.nombre,
      cuit:regData.cuit,
      tipopersona:regData.tipopersona,
      tel:regData.tel,
      role:'vendedor',
      roles:['vendedor','inversor'],
      status:'active',
      idVerified:true,
      tyc:true,
      tycTs:Date.now(),
      createdAt:Date.now()
    };
    users.push(newUser);
    setUsers(users);
    addLog('Registro: '+newUser.email,'auth');
    showLogin();
    showToast('Cuenta creada. Podés ingresar con tus credenciales','success');
  }
}

function regBack(){if(regStep>0){regStep--;renderRegStep();}}

function renderVendedorDashboard(){
  var user=state.currentUser;
  var checks=getChecks().filter(function(c){return c.ownerId===user.id;});
  var pub=checks.filter(function(c){return c.status==='publicado';});
  var neg=checks.filter(function(c){return c.status==='negociacion';});
  var cart=checks.filter(function(c){return c.status==='cartera';});
  var acord=checks.filter(function(c){return c.status==='acordado';});
  var totalMonto=checks.reduce(function(s,c){return s+c.monto;},0);
  var montoPublicado=pub.concat(neg).reduce(function(s,c){return s+c.monto;},0);
  var offers=getOffers().filter(function(o){
    return checks.find(function(c){return c.id===o.checkId;})&&o.status==='pendiente';
  });

  var html='<div class="page-header"><h1>Dashboard</h1><p>Bienvenido, '+user.name+'</p></div>';

  // Stats
  html+='<div class="stats-grid">';
  html+=statCard('En cartera',cart.length,'Sin publicar','neutral');
  html+=statCard('Publicados',pub.length,'En marketplace','up');
  html+=statCard('En negociacion',neg.length,'Con inversores','up');
  html+=statCard('Acordados',acord.length,'Operaciones cerradas','up');
  html+=statCard('Monto total',formatMoney(totalMonto),'En todos los estados','neutral');
  html+=statCard('Monto publicado',formatMoney(montoPublicado),'Publicado + negociacion','up');
  html+='</div>';

  // Notifications
  if(offers.length>0||neg.length>0){
    html+='<div class="card" style="margin-bottom:16px;border-left:3px solid var(--g)">';
    html+='<div class="card-header"><div class="card-title flex gap-8 items-center"><span class="notif-dot"></span>Notificaciones</div></div>';
    if(offers.length>0){
      html+='<div class="alert alert-success" style="margin-bottom:8px"><span>💬</span><div><div class="bold">'+offers.length+' oferta'+(offers.length>1?'s':'')+' pendiente'+(offers.length>1?'s':'')+' de respuesta</div><div style="font-size:12px">Revisalas en Negociaciones</div></div><button class="btn btn-primary btn-sm" onclick="navigateTo(\'vendedor-negociaciones\')" style="margin-left:auto">Ver ofertas</button></div>';
    }
    if(neg.length>0){
      html+='<div class="alert alert-info"><span>🤝</span><div><div class="bold">'+neg.length+' cheque'+(neg.length>1?'s':'')+' en negociacion activa</div></div></div>';
    }
    html+='</div>';
  }

  // Two columns: progress + activity
  html+='<div class="grid-2 gap-16" style="margin-bottom:16px">';

  // Estado breakdown
  html+='<div class="card"><div class="card-header"><div class="card-title">Estado de operaciones</div></div>';
  var total=checks.length||1;
  html+=progressRow('En cartera',cart.length,total,'var(--t3)');
  html+=progressRow('Publicados',pub.length,total,'var(--gm)');
  html+=progressRow('En negociacion',neg.length,total,'var(--bd)');
  html+=progressRow('Acordados',acord.length,total,'var(--g)');
  html+='</div>';

  // Recent activity
  html+='<div class="card"><div class="card-header"><div class="card-title">Actividad reciente</div></div>';
  var logs=getLogs().slice(0,8);
  if(!logs.length){
    html+='<div style="color:var(--t3);font-size:13px;text-align:center;padding:20px">Sin actividad reciente</div>';
  } else {
    var logColors={auth:'var(--bd)',check:'var(--g)',offer:'var(--am)',system:'var(--t3)'};
    logs.forEach(function(l){
      html+='<div class="log-entry"><div class="log-dot" style="background:'+(logColors[l.type]||'var(--t3)')+'"></div><div style="flex:1"><div class="log-text">'+l.msg+'</div><div class="log-time">'+new Date(l.ts).toLocaleString('es-AR')+'</div></div></div>';
    });
  }
  html+='</div>';
  html+='</div>';

  html+='<div class="card"><div class="card-header"><div class="card-title">Mis cheques</div><button class="btn btn-primary btn-sm" onclick="navigateTo(\'vendedor-cargar\')">+ Cargar eCheck</button></div>';

function statCard(label,value,sub,type){
  return '<div class="stat-card"><div class="stat-label">'+label+'</div><div class="stat-value">'+value+'</div><div class="stat-sub">'+sub+'</div></div>';
}

function progressRow(label,val,total,color){
  var pct=Math.round((val/total)*100);
  return '<div style="margin-bottom:12px"><div class="flex justify-between" style="font-size:13px;margin-bottom:4px"><span>'+label+'</span><span class="bold">'+val+'</span></div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+color+'"></div></div></div>';
}

function renderChecksRows(checks,filter){
  var filtered=filter==='todos'?checks:checks.filter(function(c){return c.status===filter;});
  if(!filtered.length)return '<tr><td colspan="10" class="text-center" style="padding:32px;color:var(--t3)">No hay cheques</td></tr>';
  return filtered.map(function(c){
    var cat=c.scoring?c.scoring.cat:'—';
    var badgeCls=c.scoring?'badge-'+cat:'';
    var dias=getDays(c.fechaPago);
    var actions='';
    if(c.status==='cartera'){
      actions='<button class="btn btn-primary btn-sm" onclick="openPublishWizard(\''+c.id+'\')">Publicar</button>';
    }else if(c.status==='publicado'||c.status==='negociacion'){
      actions='<button class="btn btn-outline btn-sm" onclick="openScoringDetail(\''+c.id+'\')">Ver scoring</button>';
    }else{
      actions='<span style="color:var(--t3);font-size:12px">Acordado</span>';
    }
    return '<tr><td><div class="bold" style="font-size:13px">'+c.razonLibrador+'</div></td>'+
      '<td class="mono" style="font-size:11px;color:var(--t3)">'+formatCuit(c.cuitLibrador)+'</td>'+
      '<td class="mono bold">'+formatMoney(c.monto)+'</td>'+
      '<td style="font-size:12px">'+c.fechaPago+'</td>'+
      '<td class="mono" style="font-size:12px;color:'+(dias<=7?'var(--rm)':dias<=30?'var(--am)':'var(--t2)')+'">'+dias+'d</td>'+
      '<td><span class="bank-chip">'+getBankName(c.banco)+'</span></td>'+
      '<td>'+(c.scoring?'<span class="badge '+badgeCls+'">'+cat+'</span>':'<span style="color:var(--t3);font-size:12px">—</span>')+'</td>'+
      '<td class="mono">'+(c.tasa?c.tasa.toFixed(1)+'%':'—')+'</td>'+
      '<td><span class="badge badge-'+getStatusBadge(c.status)+'">'+c.status+'</span></td>'+
      '<td>'+actions+'</td></tr>';
  }).join('');
}

function filterChecksTable(filter,el){
  document.querySelectorAll('#main-content .filter-chip').forEach(function(x){x.classList.remove('active');});
  el.classList.add('active');
  var user=state.currentUser;
  var checks=getChecks().filter(function(c){return c.ownerId===user.id;});
  document.getElementById('checks-tbody').innerHTML=renderChecksRows(checks,filter);
}

function getStatusBadge(s){
  if(s==='publicado')return 'A2';
  if(s==='negociacion')return 'B1';
  if(s==='acordado')return 'A1';
  return 'B2';
}

async function lookupRazonSocial(){
  var cuit=document.getElementById('c-cuit').value.trim().replace(/-/g,'').replace(/\./g,'');

  var razonInput=document.getElementById('c-razon');

    razonInput.value=demo.razon;
    return;
  }
  result.innerHTML='<span style="color:var(--t3)">Consultando BCRA...</span>';
  try {
    var r=await fetch(BCRA_DEUDAS_URL+'/'+cuit,{method:'GET',headers:{'Accept':'application/json'}});

function doCargarEcheck(){
  var tipo=document.getElementById('c-tipo').value;
  var banco=parseInt(document.getElementById('c-banco').value);
  var cuit=document.getElementById('c-cuit').value.trim().replace(/-/g,'').replace(/\./g,'');
  var razon=document.getElementById('c-razon').value.trim();
  var nro=document.getElementById('c-nro').value.trim();
  var monto=parseFloat(document.getElementById('c-monto').value);
  var emision=document.getElementById('c-emision').value;
  var pago=document.getElementById('c-pago').value;
  var err='';
  var today=new Date().toISOString().split('T')[0];
  if(!cuit)err='Ingresa el CUIT del librador.';
  else if(!nro)err='Ingresa el numero de ECHEQ.';
  else if(!monto||monto<=0)err='Ingresa un monto valido.';
  else if(!emision)err='Ingresa la fecha de emision.';
  else if(!pago)err='Ingresa la fecha de pago.';
  else if(emision>today)err='La fecha de emision no puede ser futura.';
  else if(pago<=emision)err='La fecha de pago debe ser posterior a la emision.';
  if(err){var el=document.getElementById('carga-err');el.textContent=err;el.classList.remove('hidden');return;}
  var demoNosis=DEMO_NOSIS[cuit];
  var razonFinal=razon||(demoNosis?demoNosis.razon:('CUIT '+formatCuit(cuit)));
  var checks=getChecks();
  var newCheck={
    id:'ck'+Date.now(),
    ownerId:state.currentUser.id,
    tipo:tipo,
    cuitLibrador:cuit,
    razonLibrador:razonFinal,
    monto:monto,
    fechaEmision:emision,
    fechaPago:pago,
    banco:banco,
    nroEcheq:nro,
    status:'cartera',
    scoring:null,
    tasa:null,
    createdAt:Date.now()
  };
  checks.push(newCheck);
  setChecks(checks);
  addLog('Cheque cargado: '+razonFinal+' $'+formatMoney(monto),'check');
  showToast('eCheck guardado en cartera','success');
  navigateTo('vendedor-dashboard');
}

function doBCRACheck(){
  var check=window._pwCheck;
  document.getElementById('pw-content').innerHTML='<div class="text-center" style="padding:32px"><div class="spinner spinner-green" style="width:36px;height:36px;margin:0 auto"></div><div style="margin-top:12px;color:var(--t2)">Consultando BCRA...</div></div>';
  var url=BCRA_URL+'/'+check.banco+'/'+check.nroEcheq;
  fetch(url).then(function(r){
    // 404 = cheque no encontrado en el registro = NO denunciado (respuesta normal de BCRA)
    if(r.status===404){
      showBCRAResult(false,false);
      return;
    }
    // 200 = encontrado, parsear para ver si hay denuncias
    if(r.status===200){
      r.json().then(function(data){
        var denunciado=data.results&&data.results.length>0;
        showBCRAResult(denunciado,false);
      }).catch(function(){
        showBCRAResult(false,true);
      });
      return;
    }
    // Cualquier otro status (500, CORS, etc) → fallback demo
    showBCRAResult(false,true);
  }).catch(function(){
    // Error de red / CORS → fallback demo
    showBCRAResult(false,true);
  });
}

// BCRA — CENTRAL DE DEUDORES (endeudamiento + cheques rechazados del vendedor)

// ============================================================
async function consultarDeudorBCRA(cuit) {
  var cuitLimpio=String(cuit).replace(/[-. ]/g,'').trim();
  try {
    var r=await fetch(BCRA_DEUDAS_URL+'/'+cuitLimpio,{method:'GET',headers:{'Accept':'application/json'}});
    if(r.status===404)return{ok:true,sinDatos:true,entidades:[],totalDeuda:0,situacionMax:1,diasAtrasoMax:0};
    if(!r.ok)return{ok:false,error:'HTTP '+r.status};
    var data=await r.json();
    if(!data||!data.results)return{ok:false,error:'Sin results'};
    var totalDeuda=0,situacionMax=1,diasAtrasoMax=0,entidades=[];
    var periodos=data.results.periodos||[];
    // Solo el período más reciente (primero en el array)
    if(periodos.length>0){
      (periodos[0].entidades||[]).forEach(function(e){
        totalDeuda+=(e.monto||0)*1000; // monto viene en miles de pesos
        if(e.situacion>situacionMax)situacionMax=e.situacion;
        if(e.diasAtrasoPago>diasAtrasoMax)diasAtrasoMax=e.diasAtrasoPago;
        entidades.push({entidad:e.entidad,situacion:e.situacion,monto:(e.monto||0)*1000,dias:e.diasAtrasoPago||0});
      });
    }
    return{ok:true,sinDatos:false,entidades:entidades,totalDeuda:totalDeuda,situacionMax:situacionMax,diasAtrasoMax:diasAtrasoMax};
  }catch(e){return{ok:false,error:e.message};}
}

async function consultarRechazadosBCRA(cuit) {
  var cuitLimpio=String(cuit).replace(/[-. ]/g,'').trim();
  try {
    var r=await fetch(BCRA_RECHAZADOS_URL+'/'+cuitLimpio,{method:'GET',headers:{'Accept':'application/json'}});
    if(r.status===404)return{ok:true,sinDatos:true,total:0,sinFondos:0,impagos:0,rechazos:[]};
    if(!r.ok)return{ok:false,error:'HTTP '+r.status};
    var data=await r.json();
    if(!data||!data.results)return{ok:false,error:'Sin results'};
    var total=0,sinFondos=0,impagos=0,rechazos=[];
    (data.results.causales||[]).forEach(function(causal){
      (causal.entidades||[]).forEach(function(entidad){
        (entidad.detalle||[]).forEach(function(d){
          total++;
          if((causal.causal||'').toUpperCase().indexOf('SIN FONDOS')>=0)sinFondos++;
          if(d.estadoMulta==='IMPAGA')impagos++;
          rechazos.push({nro:d.nroCheque,fecha:d.fechaRechazo,monto:d.monto,causal:causal.causal,estadoMulta:d.estadoMulta,fechaPago:d.fechaPago});
        });
      });
    });
    return{ok:true,sinDatos:total===0,total:total,sinFondos:sinFondos,impagos:impagos,rechazos:rechazos};
  }catch(e){return{ok:false,error:e.message};}
}

// Convierte resultado BCRA deudas → puntos 0-100 para scoring del vendedor
// Situación BCRA: 1=normal, 2=seguimiento especial, 3=problemas, 4=alto riesgo, 5=irrecuperable
function puntosDeudaVendedorBCRA(res){
  if(!res||!res.ok||res.sinDatos)return 100;
  var sitMap={1:100,2:70,3:40,4:10,5:0};
  var pts=sitMap[res.situacionMax]!==undefined?sitMap[res.situacionMax]:0;
  if(res.diasAtrasoMax>90)pts=Math.min(pts,20);
  else if(res.diasAtrasoMax>30)pts=Math.min(pts,50);
  return pts;
}

// Convierte resultado BCRA rechazados → puntos 0-100 para scoring del vendedor
function puntosRechazosVendedorBCRA(res){
  if(!res||!res.ok||res.sinDatos||res.total===0)return 100;
  if(res.impagos>=3)return 0;
  if(res.impagos>=1)return 20;
  if(res.sinFondos>=3)return 30;
  if(res.sinFondos>=1)return 50;
  if(res.total>=5)return 60;
  if(res.total>=1)return 80;
  return 100;
}

function pwGoStep4(){
  var scoring=window._pwScoring;
  if(scoring.cat==='C2'){
    document.getElementById('pw-content').innerHTML='<div class="alert alert-error"><span>🚫</span><div><div class="bold">Scoring C2 — No publicable</div><div>El librador no cumple los requisitos mínimos de calificación para publicar en el marketplace.</div></div></div><div class="mt-12"><div style="font-size:13px;color:var(--t2)">Razones:</div><ul style="margin-top:8px;padding-left:20px;font-size:13px">'+scoring.c2Reasons.map(function(r){return '<li>'+r+'</li>';}).join('')+'</ul></div><button class="btn btn-secondary mt-16" onclick="closeModal()">Cerrar</button>';
    return;
  }
  setPWStep(4);
  var cat=scoring.cat;
  var sp=getSpreads()[cat]||SPREADS[cat];
  var tamar=getTamar();
  var dias=getDays(window._pwCheck.fechaPago);
  var tasaMin=tamar+sp.min+(sp.plazo*(dias/30));
  var tasaMax=tamar+sp.max+(sp.plazo*(dias/30));
  var tasaMid=((tasaMin+tasaMax)/2);
  window._pwTasaMin=tasaMin;window._pwTasaMax=tasaMax;window._pwTasaSug=tasaMid;
  var html='<div class="scoring-card '+cat+'" style="margin-bottom:16px"><div class="flex justify-between items-center" style="margin-bottom:12px"><div class="flex gap-8 items-center"><span style="font-size:28px">'+CAT_EMOJI[cat]+'</span><div><div class="bold text-xl">'+cat+'</div><div style="font-size:13px;color:var(--t2)">'+scoring.pts+' puntos</div></div></div><span class="badge badge-'+cat+'">'+cat+'</span></div>';
  html+='<div class="grid-2 gap-8" style="margin-bottom:10px"><div><div class="text-sm" style="color:var(--t2)">Factores favorables</div>';
  html+=scoring.factores.map(function(f){return '<div style="font-size:12px;margin-top:4px">✅ '+f+'</div>';}).join('');
  html+='</div><div><div class="text-sm" style="color:var(--t2)">Puntos de atención</div>';
  html+=scoring.atencion.map(function(a){return '<div style="font-size:12px;margin-top:4px">⚠️ '+a+'</div>';}).join('');
  html+='</div></div>';
  if(scoring.desglose){
    html+='<div class="divider"></div><div style="font-size:11px;color:var(--t2);margin-bottom:4px;font-weight:600">DESGLOSE POR VARIABLE</div>';
    html+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">';
    var dg=scoring.desglose;
    var shortN={score_nosis:'Score',endeudamiento:'Endeud.',antiguedad:'Antigüedad',perfil_legal:'Legal',bancos:'Bancos',consultas:'Consultas',endeud_v:'EndeudV',rechazos_v:'Rechazos'};
    Object.keys(dg).forEach(function(k){
      var v=dg[k];
      html+='<div style="background:rgba(255,255,255,.5);border-radius:6px;padding:3px 7px;font-size:11px"><span style="color:var(--t2)">'+shortN[k]+'</span> <span class="mono bold">'+v.aporte+'</span></div>';
    });

function pwGoStep5(){
  var tasa=parseFloat(document.getElementById('pw-tasa').value);
  if(isNaN(tasa)||tasa<=0){showToast('Ingresá una tasa válida','error');return;}
  setPWStep(5);
  var check=window._pwCheck;
  var scoring=window._pwScoring;
  var dias=getDays(check.fechaPago);
  var descuento=check.monto*(tasa/100)*(dias/365);
  var comision=check.monto*0.01;
  var neto=check.monto-descuento-comision;
  var html='<div class="alert alert-success"><span>✅</span><div><div class="bold">Todo listo para publicar</div></div></div>';
  html+='<div class="card" style="margin:16px 0"><div class="grid-2 gap-8">';

  html+=nosisItem('Categoría',scoring.cat,'');
  html+=nosisItem('Tasa TNA',tasa.toFixed(1)+'%','');
  html+=nosisItem('Días al vencimiento',dias,'');
  html+=nosisItem('Descuento estimado',formatMoney(descuento),'');
  html+=nosisItem('Neto estimado',formatMoney(neto),'');
  html+='</div></div>';
  html+='<div class="flex gap-8" style="justify-content:flex-end"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="confirmPublish('+tasa+')">Confirmar publicación</button></div>';
  document.getElementById('pw-content').innerHTML=html;

}

function confirmPublish(tasa){
  var checks=getChecks();
  var idx=checks.findIndex(function(c){return c.id===window._pwCheck.id;});
  if(idx<0)return;
  checks[idx].status='publicado';
  checks[idx].scoring=window._pwScoring;
  checks[idx].tasa=tasa;
  setChecks(checks);
  addLog('Cheque publicado: '+checks[idx].razonLibrador+' $'+formatMoney(checks[idx].monto)+' '+window._pwScoring.cat,'check');
  closeModal();
  showToast('Cheque publicado en el marketplace','success');
  navigateTo('vendedor-dashboard');
}

function setPWStep(n){
  window._pwStep=n;
  for(var i=1;i<=5;i++){
    var d=document.getElementById('pw-d'+i);
    if(!d)continue;
    d.classList.remove('done','active');
    if(i<n)d.classList.add('done');
    else if(i===n)d.classList.add('active');
  }
}

async function consultarNosis(cuit) {
  var cuitLimpio = cuit.split('-').join('').split('.').join('').trim();
  // Usar proxy Netlify Function para evitar CORS
  var proxyUrl = '/.netlify/functions/nosis?cuit=' + cuitLimpio;
  try {
    var r = await fetch(proxyUrl, {
      method: 'GET',
      headers: { 'Accept': 'application/json' }
    });
    var rawText = await r.text();
    console.log('Nosis proxy status:', r.status, '| Body:', rawText.substring(0,300));
    if (!rawText || rawText.trim() === '{}' || rawText.trim() === 'null') {
      return { ok: false, error: 'Respuesta vacía', cuit_enviado: cuitLimpio };
    }
    if (!r.ok) {
      return { ok: false, error: 'HTTP ' + r.status + ': ' + rawText.substring(0,200), cuit_enviado: cuitLimpio };
    }
    try {
      var data = JSON.parse(rawText);
      if (!data || Object.keys(data).length === 0) {
        return { ok: false, error: 'JSON vacío', cuit_enviado: cuitLimpio };
      }
      // Verificar que Nosis devolvió estado 200
      var estado = data.Contenido && data.Contenido.Resultado && data.Contenido.Resultado.Estado;
      if (estado && estado !== '200' && estado !== 200) {
        return { ok: false, error: 'Nosis error ' + estado + ': ' + (data.Contenido.Resultado.Novedad||''), cuit_enviado: cuitLimpio };
      }
      return { ok: true, data: data, url: proxyUrl };
    } catch(pe) {
      return { ok: false, error: 'JSON inválido: ' + rawText.substring(0,100), cuit_enviado: cuitLimpio };
    }
  } catch(e) {
    return { ok: false, error: e.message, cuit_enviado: cuitLimpio };
  }
}

function mapearNosis(data) {
  // La respuesta real de Nosis tiene estructura:
  // data.Contenido.Datos.Variables.Variable[] con Nombre y Valor
  var variables = [];
  try {
    var vars = data.Contenido.Datos.Variables; if (Array.isArray(vars)) { variables = vars; } else if (vars && Array.isArray(vars.Variable)) { variables = vars.Variable; }
  } catch(e) {
    console.log('mapearNosis: estructura inesperada', e);
    return {};
  }
  var g = function(nombre) {
    var v = variables.find(function(x) { return x.Nombre === nombre; });
    return v ? v.Valor : null;
  };
  var antiguedadMeses = parseInt(g('CI_Antiguedad')) || 0;
  return {
    score:        parseFloat(g('SCO_Vig')) || 0,
    deuda:        parseFloat(g('CI_Vig_Total_Monto')) || 0,
    antiguedad:   antiguedadMeses / 12,
    bancos:       parseInt(g('CI_Vig_Total_CantBcos')) || 0,
    consultas:    parseInt(g('CO_12m_Cant')) || 0,
    rechazos24m:  parseInt(g('HC_24m_SF_NoPag_Cant')) || 0,
    rechazos6m:   parseInt(g('HC_6m_SF_NoPag_Cant')) || 0,
    juicios:      parseInt(g('JU_24m_Cant')) || 0,
    concursos:    parseInt(g('CQ_24m_Cant')) || 0,
    deudaFiscal:  g('DF_Tiene') === 'S' || g('DF_Tiene') === 'Si' || g('DF_Tiene') === true,
    inhabilitado: g('IN_Tiene') === 'S' || g('IN_Tiene') === 'Si' || g('IN_Tiene') === true,
    razonSocial:  g('VI_RazonSocial') || g('VI_Nombre') || ''
  };
}

function calcularCategoria(vars) {
  // Usar scoringVars editables si estan disponibles
  function ptsByRangos(rangos, valor) {
    for (var i = 0; i < rangos.length; i++) {
      var r = rangos[i];
      if (r.desc !== undefined) continue; // skip descriptive ranges
      var min = r.d !== undefined ? r.d : 0;
      var max = r.h;
      if (valor >= min && (max === null || valor <= max)) return r.p;
    }
    return 0;
  }
  // C2 directos activos
  var activeC2 = c2List.filter(function(c) { return c.activa; });
  if (vars.rechazos6m > 0 && activeC2.find(function(c){return c.campo.indexOf('HC_6m')>=0;}))
    return { cat:'C2', puntaje:0, razon:'Rechazos de cheques en los ultimos 6 meses' };
  if (vars.antiguedad < 0.5 && activeC2.find(function(c){return c.campo.indexOf('Antiguedad')>=0||c.campo.indexOf('AFIP')>=0;}))
    return { cat:'C2', puntaje:0, razon:'Antiguedad del CUIT menor a 6 meses' };
  if (vars.concursos > 0 && activeC2.find(function(c){return c.campo.indexOf('CQ_24m')>=0;}))
    return { cat:'C2', puntaje:0, razon:'Concurso preventivo o quiebra registrada' };
  if (vars.inhabilitado && activeC2.find(function(c){return c.campo.indexOf('IN_Tiene')>=0;}))
    return { cat:'C2', puntaje:0, razon:'Inhabilitacion vigente por BCRA' };

  // Calcular puntaje usando scoringVars
  var puntaje = 0;
  var activeVars = scoringVars.filter(function(v) { return v.activa; });
  activeVars.forEach(function(v) {
    var val = 0;
    if (v.campo.indexOf('SCO_Vig') >= 0)              val = vars.score;
    else if (v.campo.indexOf('CI_Vig_Total_Monto') >= 0 && v.campo.indexOf('vendedor') < 0) val = vars.deuda;
    else if (v.campo.indexOf('Antiguedad') >= 0 || v.campo.indexOf('AFIP') >= 0) val = vars.antiguedad;
    else if (v.campo.indexOf('CantBcos') >= 0)        val = vars.bancos;
    else if (v.campo.indexOf('CO_12m') >= 0)          val = vars.consultas;
    else if (v.campo.indexOf('vendedor') >= 0)        val = 100; // asumido OK
    else if (v.campo.indexOf('HC_vend') >= 0)         val = 100; // asumido OK
    else if (v.campo.indexOf('DF_Tiene') >= 0 || (v.campo.indexOf('JU_24m') >= 0 && v.campo.indexOf('CQ_24m') >= 0)) val = (vars.deudaFiscal ? 40 : 100) - ((vars.juicios||0)*10);
    // Find points for this value in rangos
    var pts = ptsByRangos(v.rangos, val);
    if (pts === 'C2') return; // skip, already handled above
    puntaje += (parseFloat(pts) || 0) * (v.peso / 100);
  });

  // Penalizaciones activas
  penRechazos.forEach(function(p) {
    if (!p.activa) return;
    if (p.tipo === 'c2_directo') return; // ya manejado
    if (p.reduccion && vars.rechazos24m > 0) puntaje *= (1 - p.reduccion/100);
  });
  penSF.forEach(function(p) {
    if (!p.activa) return;
    if (vars.sf_sin_multa) puntaje *= (1 - p.reduccion/100);
  });
  if (vars.deudaFiscal) {
    var pen = penFiscal.find(function(p) { return p.activa; });
    if (pen) puntaje *= (1 - pen.reduccion/100);
  }

  puntaje = Math.min(100, Math.max(0, puntaje));

  // Determinar categoria usando catList
  var cat = 'C2';
  for (var i = 0; i < catList.length; i++) {
    var c = catList[i];
    if (c.cat === 'C2') continue;
    if (puntaje >= c.pMin && puntaje <= c.pMax) { cat = c.cat; break; }
  }
  // Aplicar piso de categoria
  var catConf = catList.find(function(c) { return c.cat === cat; });
  if (catConf && catConf.piso && puntaje < catConf.piso) puntaje = catConf.piso;

  return { cat: cat, puntaje: Math.round(puntaje * 10) / 10 };
}

function tasasSugeridas(cat, dias) {
  var tamar = getTamar();
  var spreads = getSpreads();
  var sp = spreads[cat] || SPREADS[cat] || {min:0,max:0,plazo:0};
  var spA = sp.plazo * (dias / 30);
  return {
    min: +(tamar + sp.min + spA).toFixed(1),
    max: +(tamar + sp.max + spA).toFixed(1)
  };
}

// Conversion tables
function convScore(sc){
  return sc>=800?100:sc>=700?90:sc>=600?80:sc>=500?60:sc>=400?40:sc>=300?30:sc>=200?20:sc>=100?10:sc>=1?5:0;
}
function convDeuda(d){
  return d>=100000000?100:d>=50000000?80:d>=25000000?60:d>=5000000?40:d>=1000000?20:0;
}
function convAntiguedad(meses){
  var ag=meses/12;
  return ag>=10?100:ag>=7?80:ag>=5?60:ag>=3?40:ag>=1?20:ag>=0.5?10:-1;
}
function convBancos(bc){
  return bc>=5?100:bc===4?80:bc===3?60:bc===2?40:bc===1?20:0;
}
function convConsultas(co){
  return co>=40?100:co>=30?90:co>=20?80:co>=10?60:co>=5?40:co>=1?20:0;
}
function convRechazosVendedor(r){
  return r===0?100:r<=3?80:r<=8?50:r<=15?20:0;
}

// Matriz de atrasos (16 combinaciones) — retorna penalización % o 'C2'
function calcAtrasosPenalty(sc,monto,diasAtraso){
  // diasAtraso = dias promedio de atraso en mora vigente (0 si sin atrasos)
  if(diasAtraso===0)return 0;
  var lte50k=monto<50000;
  var m50_150=monto>=50000&&monto<=150000;
  var gt150=monto>150000;
  var gt500k=monto>500000;
  // C2 universal
  if(gt500k&&diasAtraso>=60)return 'C2';
  if(sc>=600){
    if(lte50k)return 0;
    if(m50_150&&diasAtraso<60)return 0;
    if(m50_150&&diasAtraso>=60)return -5;
    if(gt150&&diasAtraso<=60)return 0;
    if(gt150&&diasAtraso>60)return -10;
  }else if(sc>=400){
    if(lte50k)return 0;
    if(m50_150&&diasAtraso<60)return 0;
    if(m50_150&&diasAtraso>=60)return -10;
    if(gt150&&diasAtraso<=60)return 0;
    if(gt150&&diasAtraso>60)return -15;
  }else{
    if(lte50k)return -5;
    if(m50_150&&diasAtraso<60)return -10;
    if(m50_150&&diasAtraso>=60)return 'C2';
    if(gt150&&diasAtraso<=60)return -10;
    if(gt150&&diasAtraso>60)return 'C2';
  }
  return 0;
}

// Factor antigüedad del atraso
function factorAntiguedadAtraso(mesesAtrasoDesde){
  if(mesesAtrasoDesde<3)return 20;
  if(mesesAtrasoDesde<6)return 15;
  if(mesesAtrasoDesde<12)return 10;
  if(mesesAtrasoDesde<24)return 5;
  return 0;
}

// Factor recurrencia
function factorRecurrencia(cantAtrasos){
  if(cantAtrasos<=1)return 0;
  if(cantAtrasos===2)return 5;
  if(cantAtrasos===3)return 10;
  return 15;
}

// Techos post-penalización (piso mínimo por cat)
var CAT_FLOORS={A1:80,A2:66,B1:50,B2:30,C1:20};

async function calcScoring(nd,check){
  var w=getScoringWeights();
  var pen=getScoringPenalties();
  var c2Reasons=[];
  var factores=[];
  var atencion=[];

  // ---- C2 DIRECTOS ----
  var ag_anos=nd.antiguedad_meses/12;
  if(ag_anos<0.5)c2Reasons.push('Antigüedad CUIT del librador menor a 6 meses');
  var rechazos6m=nd.rechazos6m||(nd.rechazos24m>0&&nd.rechazos12m>0?nd.rechazos12m:0);
  if(rechazos6m>0)c2Reasons.push('Rechazos del librador en los últimos 6 meses ('+rechazos6m+')');
  if(nd.concursos>0)c2Reasons.push('Concurso preventivo o quiebra registrada');
  if(nd.inhabilitado)c2Reasons.push('Inhabilitación vigente por BCRA u organismo oficial');
  if(nd.situacionBCRA&&nd.situacionBCRA>=3)c2Reasons.push('Situación BCRA '+nd.situacionBCRA+' registrada');
  if(c2Reasons.length){
    return{cat:'C2',pts:0,factores:[],atencion:c2Reasons,rec:'No publicable — condición C2 directa',c2Reasons:c2Reasons,desglose:null};
  }

  // Antigüedad C2 por tabla
  var ptsAg=convAntiguedad(nd.antiguedad_meses);
  if(ptsAg===-1){
    return{cat:'C2',pts:0,factores:[],atencion:['Antigüedad CUIT menor a 6 meses'],rec:'No publicable',c2Reasons:['Antigüedad CUIT menor a 6 meses'],desglose:null};
  }

  // ---- DATOS VENDEDOR VIA BCRA CENTRAL DE DEUDORES ----
  // Consulta las dos APIs reales; si hay CORS/error de red usa fallback 100 (sin penalización)
  var ptsDeudaV=100;
  var ptsRv=100;
  var vendedorBCRAInfo={deuda:null,rechazos:null,fuente:'fallback'};
  var cuitVendedor=state.currentUser&&state.currentUser.cuit?state.currentUser.cuit:'';
  if(cuitVendedor){
    try{
      var resDeuda=await consultarDeudorBCRA(cuitVendedor);
      var resRechazos=await consultarRechazadosBCRA(cuitVendedor);
      ptsDeudaV=puntosDeudaVendedorBCRA(resDeuda);
      ptsRv=puntosRechazosVendedorBCRA(resRechazos);
      vendedorBCRAInfo={deuda:resDeuda,rechazos:resRechazos,fuente:resDeuda.ok?'bcra_real':'fallback'};
    }catch(e){
      console.log('BCRA Central de Deudores error:',e.message);
    }
  }

  // ---- PUNTAJE BASE ----
  var wTotal=(w.SCO_Vig+w.CI_Vig_Total_Monto+w.CI_Antiguedad+w.perfil_legal+w.CI_Vig_Total_CantBcos+w.CO_12m_Cant+w.endeud_vendedor+w.HC_vendedor)||100;

  var sc=nd.score;
  var d=nd.deuda;
  var bc=nd.bancos;
  var co=nd.consultas;

  var ptsSc=convScore(sc);
  var ptsD=convDeuda(d);
  var ptsBc=convBancos(bc);
  var ptsCo=convConsultas(co);
  var ptsLegal=(nd.juicios===0&&nd.concursos===0)?80:(nd.juicios<3?40:20);

  var s=(ptsSc*(w.SCO_Vig/100))+(ptsD*(w.CI_Vig_Total_Monto/100))+(ptsAg*(w.CI_Antiguedad/100))+(ptsLegal*(w.perfil_legal/100))+(ptsBc*(w.CI_Vig_Total_CantBcos/100))+(ptsCo*(w.CO_12m_Cant/100))+(ptsDeudaV*(w.endeud_vendedor/100))+(ptsRv*(w.HC_vendedor/100));
  // Normalize por el total de pesos (en caso de que no sumen 100)
  s=s*(100/wTotal);
  s=Math.min(100,Math.max(0,s));

  var desglose={
    score_nosis:{pts:ptsSc,peso:w.SCO_Vig,aporte:+(ptsSc*(w.SCO_Vig/100)).toFixed(1)},
    endeudamiento:{pts:ptsD,peso:w.CI_Vig_Total_Monto,aporte:+(ptsD*(w.CI_Vig_Total_Monto/100)).toFixed(1)},
    antiguedad:{pts:ptsAg,peso:w.CI_Antiguedad,aporte:+(ptsAg*(w.CI_Antiguedad/100)).toFixed(1)},
    perfil_legal:{pts:ptsLegal,peso:w.perfil_legal,aporte:+(ptsLegal*(w.perfil_legal/100)).toFixed(1)},
    bancos:{pts:ptsBc,peso:w.CI_Vig_Total_CantBcos,aporte:+(ptsBc*(w.CI_Vig_Total_CantBcos/100)).toFixed(1)},
    consultas:{pts:ptsCo,peso:w.CO_12m_Cant,aporte:+(ptsCo*(w.CO_12m_Cant/100)).toFixed(1)},
    endeud_v:{pts:ptsDeudaV,peso:w.endeud_vendedor,aporte:+(ptsDeudaV*(w.endeud_vendedor/100)).toFixed(1),fuente:vendedorBCRAInfo.fuente},
    rechazos_v:{pts:ptsRv,peso:w.HC_vendedor,aporte:+(ptsRv*(w.HC_vendedor/100)).toFixed(1),fuente:vendedorBCRAInfo.fuente}
  };

  // ---- PENALIZACIONES ----
  var penAplicadas=[];

  // Rechazos librador — antigüedad del rechazo más reciente
  var rechazos12m=nd.rechazos12m||0;
  if(nd.rechazos24m>0){
    if(rechazos12m>0){
      // Entre 6 y 12m
      var pctRech=pen.rechazo_6_12m||(-50);
      s=s*(1+pctRech/100);
      penAplicadas.push('Rechazos librador últimos 12m: '+pctRech+'%');
      // Recurrencia
      var addRec=factorRecurrencia(rechazos12m);
      if(addRec>0){s=s*(1-addRec/100);penAplicadas.push('Factor recurrencia ('+rechazos12m+' rechazos): -'+addRec+'%');}
    }else{
      // Entre 12 y 24m
      var pctRech2=pen.rechazo_12_24m||(-20);
      s=s*(1+pctRech2/100);
      penAplicadas.push('Rechazos librador últimos 24m: '+pctRech2+'%');
    }
  }

  // Deuda fiscal
  if(nd.deudaFiscal){
    var dfPct=nd.deudaFiscalPct||0;
    var dfPen=dfPct<1?(pen.df_lt1||(-2)):dfPct<5?(pen.df_1_5||(-5)):dfPct<10?(pen.df_5_10||(-8)):dfPct<20?(pen.df_10_20||(-12)):(pen.df_gt20||(-15));
    s=s*(1+dfPen/100);
    penAplicadas.push('Deuda fiscal ('+dfPct+'%): '+dfPen+'%');
  }

  // SF sin multa
  if(nd.sf_sin_multa){
    var sfPen=pen.sf_sin_multa||(-20);
    s=s*(1+sfPen/100);
    penAplicadas.push('Suspension financiera sin multa: '+sfPen+'%');
  }

  // Matriz de atrasos
  var diasAtraso=nd.diasAtraso||0;
  var montoAtraso=nd.montoAtraso||(check?check.monto:0);
  var atrasoResult=calcAtrasosPenalty(sc,montoAtraso,diasAtraso);
  if(atrasoResult==='C2'){
    return{cat:'C2',pts:0,factores:[],atencion:['Matriz de atrasos: monto>$500K con mora ≥60 días'],rec:'No publicable — condición C2 por matriz de atrasos',c2Reasons:['Matriz de atrasos da C2 directo'],desglose:desglose};
  }else if(atrasoResult<0){
    // Aplicar factor de antigüedad del atraso
    var mesesDesde=nd.mesesDesdeAtraso||0;
    var factorAnt=factorAntiguedadAtraso(mesesDesde);
    var penAtraso=atrasoResult+factorAnt;
    s=s*(1+penAtraso/100);
    penAplicadas.push('Atraso en mora ('+diasAtraso+' días): '+penAtraso+'%');
  }

  s=Math.min(100,Math.max(0,s));

  // ---- DETERMINAR CATEGORÍA ----
  var cat='C2';
  if(s>=85)cat='A1';
  else if(s>=70)cat='A2';
  else if(s>=55)cat='B1';
  else if(s>=40)cat='B2';
  else if(s>=25)cat='C1';

  // Aplicar techo de categoría (piso mínimo para la cat)
  // Si penalizaciones empujan el score debajo del piso de la cat anterior, baja de cat pero no rompe el piso de la nueva cat
  var floor=CAT_FLOORS[cat]||0;
  if(s<floor){s=floor;}

  // ---- FACTORES NARRATIVOS ----
  if(ptsSc>=80)factores.push('Score Nosis excelente ('+sc+')');
  else if(ptsSc>=60)factores.push('Score Nosis bueno ('+sc+')');
  else atencion.push('Score Nosis moderado/bajo ('+sc+')');

  if(ptsD>=80)factores.push('Endeudamiento bancario alto ('+formatMoney(d)+')');
  else if(ptsD>=40)factores.push('Endeudamiento bancario moderado ('+formatMoney(d)+')');
  else atencion.push('Endeudamiento bancario bajo ('+formatMoney(d)+')');

  if(ag_anos>=10)factores.push('Antigüedad CUIT: '+Math.round(ag_anos)+' años (excelente)');
  else if(ag_anos>=5)factores.push('Antigüedad CUIT: '+Math.round(ag_anos)+' años');
  else if(ag_anos>=3)atencion.push('Antigüedad moderada: '+Math.round(ag_anos)+' años');
  else atencion.push('Antigüedad baja: '+ag_anos.toFixed(1)+' años');

  if(bc>=5)factores.push(bc+' bancos activos (diversificación alta)');
  else if(bc>=3)factores.push(bc+' bancos activos');
  else if(bc<=1)atencion.push('Alta concentración bancaria ('+bc+' banco)');

  if(nd.juicios===0&&nd.concursos===0)factores.push('Sin juicios ni concursos registrados');
  else atencion.push('Juicios/concursos en 24m: '+(nd.juicios||0)+' / '+(nd.concursos||0));

  if(co>=20)factores.push('Alta actividad financiera ('+co+' consultas 12m)');
  else if(co>=5)factores.push(co+' consultas financieras en 12m');
  else atencion.push('Baja actividad financiera ('+co+' consultas)');

  if((nd.rechazos24m||0)===0)factores.push('Sin rechazos de cheques en 24 meses');
  else atencion.push('Rechazos en 24m: '+(nd.rechazos24m||0));

  // Factores del vendedor (BCRA Central de Deudores)
  if(vendedorBCRAInfo.fuente==='bcra_real'){
    var rd=vendedorBCRAInfo.deuda;
    var rr=vendedorBCRAInfo.rechazos;
    if(rd&&!rd.sinDatos){
      if(rd.situacionMax===1)factores.push('Vendedor: situación BCRA normal (sit.'+rd.situacionMax+')');
      else atencion.push('Vendedor: situación BCRA '+rd.situacionMax+' ('+['','Normal','Seguimiento','Problemas','Alto riesgo','Irrecuperable'][rd.situacionMax]+')');
    }else if(rd&&rd.sinDatos){
      factores.push('Vendedor: sin deudas en Central de Deudores BCRA');
    }
    if(rr&&!rr.sinDatos&&rr.total>0){
      atencion.push('Vendedor: '+rr.total+' cheque'+(rr.total>1?'s':'')+' rechazado'+(rr.total>1?'s':'')+' en BCRA'+(rr.impagos>0?' ('+rr.impagos+' multa'+( rr.impagos>1?'s':'')+' impaga'+(rr.impagos>1?'s':'')+')':''));
    }else if(rr&&(rr.sinDatos||rr.total===0)){
      factores.push('Vendedor: sin rechazos en Central de Cheques BCRA');
    }
  }else if(cuitVendedor){
    atencion.push('Vendedor: consulta BCRA no disponible (CORS/red) — score vendedor con valor neutro');
  }

  if(penAplicadas.length)atencion=atencion.concat(penAplicadas.map(function(p){return 'Penalización: '+p;}));

  var recs={A1:'Operación altamente recomendada — riesgo muy bajo',A2:'Operación favorable — riesgo bajo',B1:'Operación aceptable con monitoreo — riesgo moderado',B2:'Operación de mediano riesgo — evaluar exposición',C1:'Operación de alto riesgo — requiere garantías adicionales',C2:'No publicable'};
  return{cat:cat,pts:Math.round(s),factores:factores,atencion:atencion,rec:recs[cat]||'—',c2Reasons:[],desglose:desglose,penAplicadas:penAplicadas};
}

        var users=getUsers();
        var inv=users.find(function(u){return u.id===offer.investorId;})||{name:'Inversor'};

        html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px;background:var(--s2);border-radius:var(--r);margin-bottom:6px">';

function respondOffer(offerId,status,checkId){
  var offers=getOffers();
  var idx=offers.findIndex(function(o){return o.id===offerId;});
  if(idx<0)return;
  offers[idx].status=status;
  setOffers(offers);
  if(status==='aceptada'){
    var checks=getChecks();
    var ci=checks.findIndex(function(c){return c.id===checkId;});
    if(ci>=0){checks[ci].status='acordado';checks[ci].acordadoCon=offers[idx].investorId;setChecks(checks);}
    addLog('Oferta aceptada: cheque '+checkId,'offer');
    showToast('Oferta aceptada — operación acordada','success');
  }else{
    addLog('Oferta rechazada: '+offerId,'offer');
    showToast('Oferta rechazada','warning');
  }
  navigateTo('vendedor-negociaciones');
}

function openCounteroffer(offerId,checkId){
  var offers=getOffers();
  var offer=offers.find(function(o){return o.id===offerId;});
  var checks=getChecks();
  var check=checks.find(function(c){return c.id===checkId;});
  if(!offer||!check)return;
  var html='<div class="modal-header"><h3>Contraofertar</h3><button class="modal-close" onclick="closeModal()">✕</button></div>';
  html+='<div class="modal-body">';
  html+='<div class="alert alert-info" style="margin-bottom:16px">Oferta recibida: <span class="bold mono">'+offer.tasa.toFixed(1)+'% TNA</span><br>Tu tasa publicada: <span class="bold mono">'+(check.tasa?check.tasa.toFixed(1):'—')+'% TNA</span></div>';
  html+='<div class="field"><label>Tu contrapropuesta de tasa TNA (%)</label><input type="number" id="co-tasa" step="0.1" value="'+(check.tasa||30)+'"></div>';
  html+='</div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="doCounteroffer(\''+offerId+'\')">Enviar contraoferta</button></div>';
  showModal(html);
}

function doCounteroffer(offerId){
  var tasa=parseFloat(document.getElementById('co-tasa').value);
  if(isNaN(tasa)||tasa<=0){showToast('Tasa inválida','error');return;}
  var offers=getOffers();
  var idx=offers.findIndex(function(o){return o.id===offerId;});
  if(idx>=0){offers[idx].tasa=tasa;offers[idx].counteroffered=true;setOffers(offers);}
  addLog('Contraoferta enviada: '+tasa+'%','offer');
  closeModal();
  showToast('Contraoferta enviada','success');
  navigateTo('vendedor-negociaciones');
}

function mktSetCat(cat,el){
  mktFilter.cat=cat;
  document.querySelectorAll('#main-content .filter-bar .filter-chip').forEach(function(x){x.classList.remove('active');});
  el.classList.add('active');
  mktRender();
}

function mktRender(){
  var all=getChecks().filter(function(c){return c.status==='publicado'&&c.scoring;});
  var catSel=document.getElementById('mkt-cat');
  var plazoSel=document.getElementById('mkt-plazo');
  var ordenSel=document.getElementById('mkt-orden');
  var searchEl=document.getElementById('mkt-search');
  var cat=catSel?catSel.value:(mktFilter.cat||'todos');
  var plazo=plazoSel?plazoSel.value:'todos';
  var orden=ordenSel?ordenSel.value:'reciente';
  var search=searchEl?searchEl.value.toLowerCase().trim():'';
  if(cat!=='todos')all=all.filter(function(c){return c.scoring&&c.scoring.cat===cat;});
  if(plazo==='30')all=all.filter(function(c){var d=getDays(c.fechaPago);return d>=1&&d<=30;});
  else if(plazo==='60')all=all.filter(function(c){var d=getDays(c.fechaPago);return d>=31&&d<=60;});
  else if(plazo==='90')all=all.filter(function(c){var d=getDays(c.fechaPago);return d>=61&&d<=90;});
  if(search)all=all.filter(function(c){return c.razonLibrador.toLowerCase().indexOf(search)>=0||c.cuitLibrador.indexOf(search)>=0;});
  if(orden==='monto-asc')all.sort(function(a,b){return a.monto-b.monto;});
  else if(orden==='monto-desc')all.sort(function(a,b){return b.monto-a.monto;});
  else if(orden==='tasa-asc')all.sort(function(a,b){return (a.tasa||0)-(b.tasa||0);});
  else if(orden==='tasa-desc')all.sort(function(a,b){return (b.tasa||0)-(a.tasa||0);});
  else if(orden==='plazo-asc')all.sort(function(a,b){return getDays(a.fechaPago)-getDays(b.fechaPago);});
  var grid=document.getElementById('market-grid');
  if(grid)grid.innerHTML=renderMarketCards(all);
}

  return checks.map(function(c){
    var dias=getDays(c.fechaPago);
    var cat=c.scoring.cat;
    var sp=getSpreads()[cat]||SPREADS[cat];
    return '<div class="market-card" onclick="openOfferModal(\''+c.id+'\')"><div class="market-card-top"><span class="badge badge-'+cat+'">'+CAT_EMOJI[cat]+' '+cat+'</span><div class="bank-chip">'+getBankName(c.banco)+'</div></div><div class="market-amount">'+formatMoney(c.monto)+'</div><div class="market-meta"><div class="market-meta-item">Tasa TNA<span class="mono" style="color:var(--g)">'+c.tasa.toFixed(1)+'%</span></div><div class="market-meta-item">Plazo<span>'+dias+' días</span></div><div class="market-meta-item">Vence<span>'+c.fechaPago+'</span></div><div class="market-meta-item">Librador<span>'+c.razonLibrador.substring(0,18)+'</span></div></div></div>';
  }).join('');
}

function calcOfferNeto(checkId){
  var check=getChecks().find(function(c){return c.id===checkId;});
  if(!check)return;
  var tasa=parseFloat(document.getElementById('offer-tasa').value)||0;
  var dias=getDays(check.fechaPago);
  document.getElementById('offer-calc').innerHTML=renderOfferCalc(check.monto,tasa,dias);
}

function renderOfferCalc(monto,tasa,dias){
  var tamar=getTamar();
  var descuento=monto*(tasa/100)*(dias/365);
  var comision=monto*0.01;
  var netoVendedor=monto-descuento-comision;
  var netoInversor=monto-descuento;
  var retBruto=(descuento-comision)/netoInversor*100;
  var html='<div class="bold text-sm" style="margin-bottom:8px;color:var(--t2)">CALCULADORA DE NETO</div>';
  html+=calcRow('Monto nominal',formatMoney(monto),false);
  html+=calcRow('Descuento','-'+formatMoney(descuento),false);
  html+=calcRow('Comisión (1%)','-'+formatMoney(comision),false);
  html+=calcRow('Neto vendedor',formatMoney(netoVendedor),true);
  html+=calcRow('Neto inversor (paga)',formatMoney(netoInversor),false);
  html+=calcRow('Retorno bruto',retBruto.toFixed(2)+'%',true);
  return html;
}

function calcRow(label,val,highlight){
  return '<div class="calc-result-row'+(highlight?' highlight':'')+'"><span>'+label+'</span><span class="mono bold">'+val+'</span></div>';
}

function submitOffer(checkId){
  var tasa=parseFloat(document.getElementById('offer-tasa').value);
  if(isNaN(tasa)||tasa<=0){showToast('Ingresá una tasa válida','error');return;}
  var existing=getOffers().find(function(o){return o.checkId===checkId&&o.investorId===state.currentUser.id&&o.status==='pendiente';});
  if(existing){showToast('Ya tenés una oferta pendiente para este cheque','warning');return;}
  var offers=getOffers();
  offers.push({id:'of'+Date.now(),checkId:checkId,investorId:state.currentUser.id,tasa:tasa,status:'pendiente',createdAt:Date.now()});
  setOffers(offers);
  // update check status
  var checks=getChecks();
  var idx=checks.findIndex(function(c){return c.id===checkId;});
  if(idx>=0&&checks[idx].status==='publicado'){checks[idx].status='negociacion';setChecks(checks);}
  addLog('Oferta enviada: '+tasa+'% TNA para cheque '+checkId,'offer');
  closeModal();
  showToast('Oferta enviada correctamente','success');
}

  var user=state.currentUser;
  var offers=getOffers().filter(function(o){return o.investorId===user.id&&o.status==='aceptada';});
  var checks=getChecks();
  var acordados=checks.filter(function(c){return c.acordadoCon===user.id||offers.find(function(o){return o.checkId===c.id;});});
  var totalInv=acordados.reduce(function(s,c){return s+c.monto;},0);

function renderCalculadora(){
  var today=new Date();
  var futureDate=new Date(today.getTime()+86400000*45);
  return '<div class="page-header"><h1>Calculadora</h1><p>Calculá descuentos, comisiones y rendimientos</p></div><div style="max-width:540px"><div class="card"><div class="grid-2"><div class="field"><label>Monto nominal ($)</label><input type="number" id="calc-monto" value="1000000" oninput="doCalc()"></div><div class="field"><label>Tasa TNA (%)</label><input type="number" id="calc-tasa" step="0.1" value="33.5" oninput="doCalc()"></div></div><div class="field"><label>Fecha de vencimiento</label><input type="date" id="calc-fecha" value="'+futureDate.toISOString().split('T')[0]+'" oninput="doCalc()"></div><div class="calc-result" id="calc-result">'+doCalcHTML(1000000,33.5,45)+'</div></div></div>';
}

function doCalc(){
  var m=parseFloat(document.getElementById('calc-monto').value)||0;
  var t=parseFloat(document.getElementById('calc-tasa').value)||0;
  var fecha=document.getElementById('calc-fecha').value;
  var today=new Date();today.setHours(0,0,0,0);
  var vence=new Date(fecha);
  var dias=Math.max(0,Math.round((vence-today)/86400000));
  document.getElementById('calc-result').innerHTML=doCalcHTML(m,t,dias);
}

function doCalcHTML(monto,tasa,dias){
  var descuento=monto*(tasa/100)*(dias/365);
  var comision=monto*0.01;
  var netoV=monto-descuento-comision;
  var netoI=monto-descuento;
  var retBruto=netoI>0?(descuento-comision)/netoI*100:0;
  var tea=netoI>0?(Math.pow(1+(descuento/netoI),365/dias)-1)*100:0;
  var html='<div class="bold text-sm" style="margin-bottom:12px;color:var(--t2)">RESULTADO — '+dias+' días</div>';
  html+=calcRow('Días al vencimiento',dias,'');
  html+=calcRow('Descuento',formatMoney(descuento),false);
  html+=calcRow('Comisión OpenCheck (1%)',formatMoney(comision),false);
  html+=calcRow('Neto vendedor',formatMoney(netoV),true);
  html+=calcRow('Neto inversor (paga)',formatMoney(netoI),false);
  html+=calcRow('Retorno bruto',retBruto.toFixed(2)+'%',true);
  html+=calcRow('TNA efectiva',tasa.toFixed(2)+'%',false);
  html+=calcRow('TEA',tea.toFixed(2)+'%',false);
  return html;
}

function recalcAllSpr(){
  var tamarEl=document.getElementById('tamar-val');
  if(!tamarEl)return;
  document.querySelectorAll('#spreads-tb tbody tr').forEach(function(tr){recalcRow(tr);});
}

function saveSpreadsTable(){
  // Read from table and save per-category (use first row of each cat as canonical)
  var saved={};
  document.querySelectorAll('#spreads-tb tbody tr').forEach(function(tr){
    var cat=tr.dataset.cat;
    if(!cat||saved[cat])return; // first row per cat
    var ins=tr.querySelectorAll('.spr-in');
    if(ins.length<3)return;
    saved[cat]={min:parseFloat(ins[0].value)||0,max:parseFloat(ins[1].value)||0,plazo:parseFloat(ins[2].value)||0};
  });
  var spreads=getSpreads();
  Object.keys(saved).forEach(function(k){spreads[k]=saved[k];});
  setSpreads(spreads);
  addLog('Spreads actualizados','system');
  showToast('Spreads guardados correctamente','success');
}

function saveTamar(){
  var v=parseFloat(document.getElementById('tamar-val').value);
  if(isNaN(v)||v<=0){showToast('TAMAR invalida','error');return;}
  setTamar(v);
  addLog('TAMAR actualizada: '+v+'%','system');
  showToast('TAMAR guardada: '+v+'%','success');
  // Recalc spreads table in place if it's visible
  document.querySelectorAll('#spreads-tb tbody tr').forEach(function(tr){recalcRow(tr);});
}

function showScoringTab(tab){
  ['vars','pen','c2','cat'].forEach(function(t){
    var el=document.getElementById('scp-'+t);
    var btn=document.getElementById('sct-'+t);
    if(el)el.style.display=t===tab?'block':'none';
    if(btn)btn.classList.toggle('on',t===tab);
  });
  if(tab==='vars'){renderVarsSA();renderRangosSA();chkPesosSA();}
  if(tab==='pen'){renderPenRechSA();renderPenSFSA();renderPenFiscalSA();renderMatrizBaseSA();renderMatrizAntigSA();renderMatrizRecurrSA();}
  if(tab==='c2')renderC2SA();
  if(tab==='cat')renderCatSA();
}

function chkPesosSA(){
  var tot=scoringVars.filter(function(v){return v.activa;}).reduce(function(s,v){return s+v.peso;},0);
  var ok=Math.abs(tot-100)<0.01;
  var okEl=document.getElementById('peso-ok');
  var errEl=document.getElementById('peso-err');
  var totEl=document.getElementById('peso-tot');
  var errVEl=document.getElementById('peso-err-v');
  if(okEl)okEl.style.display=ok?'block':'none';
  if(errEl)errEl.style.display=ok?'none':'block';
  if(totEl)totEl.textContent=tot.toFixed(1)+'%';
  if(errVEl)errVEl.textContent=tot.toFixed(1)+'%';
}
function updPesoSA(id,v){var x=scoringVars.find(function(x){return x.id===id;});if(x){x.peso=parseFloat(v)||0;}chkPesosSA();}
function togVarSA(id,ch){var x=scoringVars.find(function(x){return x.id===id;});if(x){x.activa=ch;}renderVarsSA();renderRangosSA();chkPesosSA();}
function quitarVarSA(id){if(!confirm('Quitar esta variable?'))return;scoringVars=scoringVars.filter(function(x){return x.id!==id;});renderVarsSA();renderRangosSA();chkPesosSA();}
function updRangoSA(vid,ri,k,v){var x=scoringVars.find(function(x){return x.id===vid;});if(x&&x.rangos[ri])x.rangos[ri][k]=v;}
function addRangoSA(vid){var x=scoringVars.find(function(x){return x.id===vid;});if(!x)return;var esD=x.rangos[0]&&x.rangos[0].desc!==undefined;if(esD)x.rangos.push({desc:'Nueva opcion',p:50});else x.rangos.push({d:0,h:0,p:50});renderRangosSA();}
function quitarRangoSA(vid,ri){var x=scoringVars.find(function(x){return x.id===vid;});if(x&&x.rangos.length>1){x.rangos.splice(ri,1);renderRangosSA();}}

function renderVarsSA(){
  var tb=document.getElementById('vars-tb');
  if(!tb)return;
  tb.innerHTML=scoringVars.map(function(v){
    return '<tr>'+
    '<td><input type="text" value="'+v.nm+'" style="width:100%;padding:4px 8px;font-size:12px;border:1px solid var(--s3);border-radius:6px" onchange="scoringVars.find(function(x){return x.id==='+v.id+'}).nm=this.value"></td>'+

  }).join('');
}
